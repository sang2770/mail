  <title>Quản trị viên</title>
  <style>
    body {
      font-family: Inter, Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      color: #1f2937;
    }

    .wrap {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      margin-bottom: 16px;
    }

    h1,
    h2 {
      margin: 0 0 12px;
    }

    form {
      display: grid;
      grid-template-columns: 1.4fr 1.2fr 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    input,
    select,
    button {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
    }

    button {
      cursor: pointer;
      border: 0;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
    }

    button.secondary {
      background: #6b7280;
    }

    button.danger {
      background: #dc2626;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 6px;
      font-size: 14px;
    }

    .msg {
      font-size: 14px;
      margin-top: 4px;
      color: #2563eb;
    }

    .small {
      font-size: 13px;
      color: #6b7280;
    }

    .row-actions {
      display: flex;
      gap: 8px;
    }

    @media (max-width: 900px) {
      form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <h1>Admin Dashboard</h1>
      <div>
        <a href="/" style="margin-right: 8px">Trang chủ</a>
        <button class="secondary" id="logoutBtn">Đăng xuất</button>
      </div>
    </div>

    <div class="card">
      <h2>Quản lý User</h2>
      <form id="userForm">
        <input id="username" placeholder="username" required />
        <input id="password" placeholder="password" required />
        <select id="role" required>
          <option value="basic">basic</option>
          <option value="premium">premium</option>
          <option value="vip">vip</option>
          <option value="admin">admin</option>
        </select>
        <button type="submit">Thêm user</button>
      </form>
      <table>
        <thead>
          <tr>
            <th>Username</th>
            <th>Loại</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="userTable"></tbody>
      </table>
      <div id="userMsg" class="msg"></div>
    </div>

    <div class="card">
      <h2>Quản lý Domain</h2>
      <form id="domainForm">
        <input id="domainName" placeholder="example.com" required />
        <select id="domainTier" required>
          <option value="basic">basic</option>
          <option value="premium">premium</option>
          <option value="vip">vip</option>
        </select>
        <select id="domainPublic" required>
          <option value="true">Công khai</option>
          <option value="false">Riêng tư</option>
        </select>
        <button type="submit">Thêm domain</button>
      </form>
      <table>
        <thead>
          <tr>
            <th>Domain</th>
            <th>Loại</th>
            <th>Công khai</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="domainTable"></tbody>
      </table>
      <div id="domainMsg" class="msg"></div>
    </div>

    <div class="card">
      <h2>Quản lý Email đã tạo</h2>
      <form id="mailboxFilterForm" style="grid-template-columns: 1fr auto auto">
        <input id="mailboxQuery" placeholder="Tìm email, ví dụ: abc@" />
        <button type="submit">Tìm kiếm</button>
        <button type="button" class="secondary" id="exportMailboxBtn">
          Export TXT
        </button>
      </form>
      <div class="small" id="mailboxCount"></div>
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Số thư</th>
            <th>Tạo lúc</th>
            <th>Hoạt động gần nhất</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="mailboxTable"></tbody>
      </table>
      <div id="mailboxMsg" class="msg"></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("mail_token");
    const role = localStorage.getItem("mail_role");

    if (!token || role !== "admin") {
      window.location.href = "/login.html";
    }

    const authHeaders = {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`,
    };

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {
          ...authHeaders,
          ...(options.headers || {}),
        },
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "Request failed");
      }
      return data;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDateTime(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleString("vi-VN");
    }

    async function loadUsers() {
      const users = await api("/api/admin/users");
      const table = document.getElementById("userTable");
      table.innerHTML = users
        .map(
          (u) => `
        <tr>
          <td>${u.username}</td>
          <td>
            <select onchange="updateUserRole('${u.username}', this.value)">
              <option value="basic" ${u.role === "basic" ? "selected" : ""}>basic</option>
              <option value="premium" ${u.role === "premium" ? "selected" : ""}>premium</option>
              <option value="vip" ${u.role === "vip" ? "selected" : ""}>vip</option>
              <option value="admin" ${u.role === "admin" ? "selected" : ""}>admin</option>
            </select>
          </td>
          <td><button class="danger" onclick="deleteUser('${u.username}')">Xóa</button></td>
        </tr>
      `,
        )
        .join("");
    }

    async function loadDomains() {
      const domains = await api("/api/admin/domains");
      const table = document.getElementById("domainTable");
      table.innerHTML = domains
        .map(
          (d) => `
        <tr>
          <td>${d.name}</td>
          <td>
            <select onchange="updateDomainTier('${d.name}', this.value)">
              <option value="basic" ${d.tier === "basic" ? "selected" : ""}>basic</option>
              <option value="premium" ${d.tier === "premium" ? "selected" : ""}>premium</option>
              <option value="vip" ${d.tier === "vip" ? "selected" : ""}>vip</option>
            </select>
          </td>
          <td>${d.public ? "yes" : "no"}</td>
          <td><button class="danger" onclick="deleteDomain('${d.name}')">Xóa</button></td>
        </tr>
      `,
        )
        .join("");
    }

    async function loadMailboxes() {
      const query = document.getElementById("mailboxQuery").value.trim();
      const result = await api(
        `/api/admin/mailboxes?page=1&limit=200&q=${encodeURIComponent(query)}`,
      );
      const table = document.getElementById("mailboxTable");

      if (!result.mailboxes || !result.mailboxes.length) {
        table.innerHTML =
          '<tr><td colspan="5" class="small">Chưa có email nào được tạo</td></tr>';
      } else {
        table.innerHTML = result.mailboxes
          .map(
            (m) => `
          <tr>
            <td>${escapeHtml(m.email)}</td>
            <td>${m.message_count ?? 0}</td>
            <td>${formatDateTime(m.created_at)}</td>
            <td>${formatDateTime(m.last_seen)}</td>
            <td>
              <div class="row-actions">
                <button class="danger" onclick="deleteMailbox('${encodeURIComponent(
              m.email,
            )}')">Xóa</button>
              </div>
            </td>
          </tr>
        `,
          )
          .join("");
      }

      document.getElementById("mailboxCount").textContent =
        `Tổng: ${result.total || 0} email`;
    }

    async function updateUserRole(username, role) {
      try {
        await api(`/api/admin/users/${username}`, {
          method: "PATCH",
          body: JSON.stringify({ role }),
        });
        document.getElementById("userMsg").textContent =
          `Đã cập nhật role cho ${username}`;
      } catch (error) {
        document.getElementById("userMsg").textContent = error.message;
      }
    }

    async function deleteUser(username) {
      if (!confirm(`Xóa user ${username}?`)) return;
      try {
        await api(`/api/admin/users/${username}`, { method: "DELETE" });
        await loadUsers();
      } catch (error) {
        document.getElementById("userMsg").textContent = error.message;
      }
    }

    async function updateDomainTier(name, tier) {
      try {
        await api(`/api/admin/domains/${name}`, {
          method: "PATCH",
          body: JSON.stringify({ tier }),
        });
        document.getElementById("domainMsg").textContent =
          `Đã cập nhật tier ${name}`;
      } catch (error) {
        document.getElementById("domainMsg").textContent = error.message;
      }
    }

    async function deleteDomain(name) {
      if (!confirm(`Xóa domain ${name}?`)) return;
      try {
        await api(`/api/admin/domains/${name}`, { method: "DELETE" });
        await loadDomains();
      } catch (error) {
        document.getElementById("domainMsg").textContent = error.message;
      }
    }

    async function deleteMailbox(encodedEmail) {
      const email = decodeURIComponent(encodedEmail);
      if (!confirm(`Xóa mailbox ${email}? Toàn bộ thư trong mailbox cũng sẽ bị xóa.`))
        return;

      try {
        await api("/api/admin/mailboxes", {
          method: "DELETE",
          body: JSON.stringify({ email }),
        });
        document.getElementById("mailboxMsg").textContent =
          `Đã xóa mailbox ${email}`;
        await loadMailboxes();
      } catch (error) {
        document.getElementById("mailboxMsg").textContent = error.message;
      }
    }

    async function exportMailboxes() {
      const query = document.getElementById("mailboxQuery").value.trim();
      const url = `/api/admin/mailboxes/export.txt?q=${encodeURIComponent(query)}`;

      try {
        const response = await fetch(url, { headers: authHeaders });
        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.error || "Export failed");
        }

        const blob = await response.blob();
        const disposition = response.headers.get("Content-Disposition") || "";
        const matched = disposition.match(/filename=([^;]+)/i);
        const fileName = matched
          ? matched[1].replace(/\"/g, "")
          : "mailboxes.txt";

        const downloadUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = downloadUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(downloadUrl);
        document.getElementById("mailboxMsg").textContent =
          "Export file TXT thành công";
      } catch (error) {
        document.getElementById("mailboxMsg").textContent = error.message;
      }
    }

    document
      .getElementById("userForm")
      .addEventListener("submit", async (event) => {
        event.preventDefault();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const role = document.getElementById("role").value;

        try {
          await api("/api/admin/users", {
            method: "POST",
            body: JSON.stringify({ username, password, role }),
          });
          document.getElementById("userMsg").textContent =
            "Thêm user thành công";
          event.target.reset();
          await loadUsers();
        } catch (error) {
          document.getElementById("userMsg").textContent = error.message;
        }
      });

    document
      .getElementById("domainForm")
      .addEventListener("submit", async (event) => {
        event.preventDefault();
        const name = document.getElementById("domainName").value.trim();
        const tier = document.getElementById("domainTier").value;
        const isPublic =
          document.getElementById("domainPublic").value === "true";

        try {
          await api("/api/admin/domains", {
            method: "POST",
            body: JSON.stringify({ name, tier, public: isPublic }),
          });
          document.getElementById("domainMsg").textContent =
            "Thêm domain thành công";
          event.target.reset();
          await loadDomains();
        } catch (error) {
          document.getElementById("domainMsg").textContent = error.message;
        }
      });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("mail_token");
      localStorage.removeItem("mail_role");
      localStorage.removeItem("mail_username");
      localStorage.removeItem("mail_token_expiry");
      window.location.href = "/login.html";
    });

    document
      .getElementById("mailboxFilterForm")
      .addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          await loadMailboxes();
          document.getElementById("mailboxMsg").textContent = "";
        } catch (error) {
          document.getElementById("mailboxMsg").textContent = error.message;
        }
      });

    document
      .getElementById("exportMailboxBtn")
      .addEventListener("click", exportMailboxes);

    Promise.all([loadUsers(), loadDomains(), loadMailboxes()]).catch((error) => {
      alert(error.message);
      if (
        error.message.toLowerCase().includes("unauthorized") ||
        error.message.toLowerCase().includes("admin")
      ) {
        window.location.href = "/login.html";
      }
    });

    window.updateUserRole = updateUserRole;
    window.deleteUser = deleteUser;
    window.updateDomainTier = updateDomainTier;
    window.deleteDomain = deleteDomain;
    window.deleteMailbox = deleteMailbox;
  </script>
</body>

</html>
